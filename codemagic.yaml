workflows:
  ios-capacitor-build:
    name: iOS Capacitor Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: PractCoach-Codemagic

    environment:
      groups:
        - PractCoach
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.practcoach.app
      node: latest
      xcode: latest
      cocoapods: default

    scripts:
      - npm install
      - npm run build
      - npx cap sync ios
      - keychain initialize
      - keychain add-certificates
      - xcode-project use-profiles
      - xcode-project build-ipa --project ios/App/App.xcodeproj --scheme App

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM